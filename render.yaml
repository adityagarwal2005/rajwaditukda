services:
  - type: web
    name: rajwaditukda-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_STORAGE_ENDPOINT_URL
        sync: false
      - key: SUPABASE_STORAGE_REGION
        sync: false
      - key: SUPABASE_STORAGE_BUCKET_NAME
        sync: false
      - key: SUPABASE_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: PAYMENT_UPI_ID
        sync: false
      - key: PAYMENT_BANK_ACCOUNT_NAME
        sync: false
      - key: PAYMENT_BANK_ACCOUNT_NUMBER
        sync: false
      - key: PAYMENT_BANK_IFSC
        sync: false
      - key: PAYMENT_BANK_NAME
        sync: false
      - key: PAYMENT_WHATSAPP_NUMBER
        sync: false
      - key: ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"

  - type: web
    name: rajwaditukda-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
